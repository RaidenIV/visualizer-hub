<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0075ff" />
  <meta name="description" content="A 3D cylindrical gallery hub for interactive audio visualization projects." />
  <title>AUDIO VISUALIZATION HUB</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <a class="skip-link" href="#xmbMenu">Skip to cross media bar</a>

  <div class="app-shell" id="appShell">
    <aside class="sidebar" id="sidebar" aria-label="Audio visualization hub sidebar">
      <button
        class="sidebar-toggle"
        id="sidebarToggle"
        type="button"
        aria-controls="sidebar"
        aria-expanded="true"
        aria-label="Collapse sidebar"
        title="Collapse sidebar"
      >
        <span id="sidebarToggleIcon" aria-hidden="true">‹</span>
      </button>

      <section class="sidebar-section sidebar-section--controls" aria-labelledby="visualControlsTitle">
        <div class="section-heading">
          <span id="visualControlsTitle">VISUAL SETTINGS</span>
          <span>LIVE</span>
        </div>

        <div class="showcase-control-row" role="group" aria-label="Visualization preset">
          <button class="showcase-control" type="button" data-preset="default">DEFAULT</button>
          <button class="showcase-control is-active" type="button" data-preset="blueScifi">BLUE SCIFI</button>
        </div>

        <div class="showcase-control-row" role="group" aria-label="Visualization controls">
          <button class="showcase-control is-active" id="shapeToggle" type="button" aria-pressed="true">SHAPE</button>
          <button class="showcase-control" id="configToggle" type="button" aria-expanded="false" aria-controls="configPanel">CONFIG</button>
        </div>

        <div class="showcase-control-row showcase-control-row--single">
          <button class="showcase-control" id="exportSettings" type="button">EXPORT JSON</button>
        </div>

        <div class="config-panel" id="configPanel" hidden>
          <details open>
            <summary>GALLERY</summary>
            <label class="config-control">
              <span>IMAGE SIZE</span><output data-output-for="imageScale">0.83</output>
              <input type="range" min="0.3" max="2" step="0.01" value="0.83" data-scene-setting="imageScale" />
            </label>
            <label class="config-control">
              <span>RADIUS</span><output data-output-for="radius">6.40</output>
              <input type="range" min="1" max="10" step="0.1" value="6.4" data-scene-setting="radius" />
            </label>
            <label class="config-control">
              <span>SPIRAL STEP</span><output data-output-for="spiralStep">1.48</output>
              <input type="range" min="0.3" max="5" step="0.05" value="1.48" data-scene-setting="spiralStep" />
            </label>
            <label class="config-control">
              <span>IMAGES / TURN</span><output data-output-for="imagesPerTurn">6</output>
              <input type="range" min="2" max="10" step="1" value="6" data-scene-setting="imagesPerTurn" />
            </label>
            <label class="config-control">
              <span>CURVATURE</span><output data-output-for="curvature">1.50</output>
              <input type="range" min="0.5" max="4" step="0.05" value="1.5" data-scene-setting="curvature" />
            </label>
          </details>

          <details>
            <summary>MOTION</summary>
            <label class="config-control">
              <span>MOMENTUM</span><output data-output-for="momentum">0.87</output>
              <input type="range" min="0.5" max="0.99" step="0.01" value="0.87" data-scene-setting="momentum" />
            </label>
            <label class="config-control">
              <span>SCROLL ADVANCE SPEED</span><output data-output-for="scrollAdvanceSpeed">0.17</output>
              <input type="range" min="0" max="2" step="0.01" value="0.17" data-scene-setting="scrollAdvanceSpeed" />
            </label>
            <label class="config-control">
              <span>AUTO-ROTATE SPEED</span><output data-output-for="autoRotateSpeed">0.0020</output>
              <input type="range" min="0" max="0.02" step="0.0005" value="0.002" data-scene-setting="autoRotateSpeed" />
            </label>
            <label class="config-control">
              <span>SCROLL ROTATE FORCE</span><output data-output-for="scrollRotateForce">1.75</output>
              <input type="range" min="0" max="5" step="0.05" value="1.75" data-scene-setting="scrollRotateForce" />
            </label>
            <label class="config-control">
              <span>MAX ROTATION SPEED</span><output data-output-for="maxRotationSpeed">0.150</output>
              <input type="range" min="0.005" max="0.2" step="0.005" value="0.15" data-scene-setting="maxRotationSpeed" />
            </label>
            <label class="config-control">
              <span>ROTATION SMOOTHING</span><output data-output-for="rotationSmoothing">0.090</output>
              <input type="range" min="0.005" max="0.2" step="0.005" value="0.09" data-scene-setting="rotationSmoothing" />
            </label>
          </details>

          <details>
            <summary>EFFECTS</summary>
            <label class="config-control">
              <span>SQUEEZE INTENSITY</span><output data-output-for="squeezeMax">0.50</output>
              <input type="range" min="0" max="0.8" step="0.01" value="0.5" data-scene-setting="squeezeMax" />
            </label>
            <label class="config-control">
              <span>SQUEEZE WIDTH</span><output data-output-for="squeezeWidth">7.50</output>
              <input type="range" min="1" max="15" step="0.5" value="7.5" data-scene-setting="squeezeWidth" />
            </label>
            <label class="config-control">
              <span>CHROMATIC ABERRATION</span><output data-output-for="chromaticAberration">0.020</output>
              <input type="range" min="0" max="0.15" step="0.005" value="0.02" data-scene-setting="chromaticAberration" />
            </label>
            <label class="config-control">
              <span>OPACITY</span><output data-output-for="opacity">1.00</output>
              <input type="range" min="0" max="1" step="0.01" value="1" data-scene-setting="opacity" />
            </label>
            <label class="config-control">
              <span>EMISSION</span><output data-output-for="emission">0.65</output>
              <input type="range" min="0" max="3" step="0.05" value="0.65" data-scene-setting="emission" />
            </label>
            <label class="config-control">
              <span>SATURATION</span><output data-output-for="saturation">1.50</output>
              <input type="range" min="0" max="3" step="0.05" value="1.5" data-scene-setting="saturation" />
            </label>
            <label class="config-control">
              <span>BRIGHTNESS</span><output data-output-for="brightness">1.15</output>
              <input type="range" min="0.2" max="3" step="0.05" value="1.15" data-scene-setting="brightness" />
            </label>
            <label class="config-control">
              <span>SCAN LINES</span><output data-output-for="scanLines">0.60</output>
              <input type="range" min="0" max="1" step="0.05" value="0.6" data-scene-setting="scanLines" />
            </label>
            <label class="config-control">
              <span>SCAN SPEED</span><output data-output-for="scanLineSpeed">3.90</output>
              <input type="range" min="0" max="5" step="0.1" value="3.9" data-scene-setting="scanLineSpeed" />
            </label>
            <label class="config-control">
              <span>SCAN DENSITY</span><output data-output-for="scanLineDensity">25</output>
              <input type="range" min="5" max="100" step="1" value="25" data-scene-setting="scanLineDensity" />
            </label>
            <label class="config-control">
              <span>FADE START</span><output data-output-for="distanceFadeStart">3.00</output>
              <input type="range" min="0" max="20" step="0.5" value="3" data-scene-setting="distanceFadeStart" />
            </label>
            <label class="config-control">
              <span>FADE END</span><output data-output-for="distanceFadeEnd">8.00</output>
              <input type="range" min="1" max="30" step="0.5" value="8" data-scene-setting="distanceFadeEnd" />
            </label>
            <label class="config-control">
              <span>FLICKER</span><output data-output-for="flickerIntensity">0.18</output>
              <input type="range" min="0" max="1" step="0.01" value="0.18" data-scene-setting="flickerIntensity" />
            </label>
            <label class="config-control">
              <span>FLICKER SPEED</span><output data-output-for="flickerSpeed">5.00</output>
              <input type="range" min="0.1" max="5" step="0.1" value="5" data-scene-setting="flickerSpeed" />
            </label>
          </details>

          <details>
            <summary>BORDER</summary>
            <label class="config-control">
              <span>WIDTH</span><output data-output-for="borderWidth">0.005</output>
              <input type="range" min="0.005" max="0.1" step="0.005" value="0.005" data-scene-setting="borderWidth" />
            </label>
            <label class="config-control config-control--color">
              <span>COLOR</span><output data-output-for="borderColor">#FFFFFF</output>
              <input type="color" value="#ffffff" data-scene-setting="borderColor" />
            </label>
            <label class="config-control">
              <span>GLOW</span><output data-output-for="borderEmission">0.00</output>
              <input type="range" min="0" max="5" step="0.1" value="0" data-scene-setting="borderEmission" />
            </label>
            <label class="config-control">
              <span>RADIUS</span><output data-output-for="borderRadius">0.000</output>
              <input type="range" min="0" max="0.25" step="0.005" value="0" data-scene-setting="borderRadius" />
            </label>
            <label class="config-control">
              <span>OFFSET</span><output data-output-for="borderOffset">0.000</output>
              <input type="range" min="-0.1" max="0.1" step="0.005" value="0" data-scene-setting="borderOffset" />
            </label>
          </details>

          <details>
            <summary>CORNERS</summary>
            <label class="config-control">
              <span>SIZE</span><output data-output-for="cornerSize">0.06</output>
              <input type="range" min="0" max="0.4" step="0.01" value="0.06" data-scene-setting="cornerSize" />
            </label>
            <label class="config-control">
              <span>WIDTH</span><output data-output-for="cornerWidth">0.005</output>
              <input type="range" min="0.005" max="0.08" step="0.005" value="0.005" data-scene-setting="cornerWidth" />
            </label>
            <label class="config-control">
              <span>OFFSET</span><output data-output-for="cornerOffset">0.030</output>
              <input type="range" min="-0.1" max="0.15" step="0.005" value="0.03" data-scene-setting="cornerOffset" />
            </label>
          </details>

          <details>
            <summary>DITHER</summary>
            <label class="config-control config-control--toggle">
              <span>ENABLED</span><output data-output-for="ditherEnabled">ON</output>
              <input type="checkbox" checked data-scene-setting="ditherEnabled" />
            </label>
            <label class="config-control">
              <span>CELL SIZE</span><output data-output-for="ditherCellSize">2</output>
              <input type="range" min="0" max="10" step="1" value="2" data-scene-setting="ditherCellSize" />
            </label>
            <label class="config-control">
              <span>GAP</span><output data-output-for="ditherGap">2.75</output>
              <input type="range" min="0" max="20" step="0.25" value="2.75" data-scene-setting="ditherGap" />
            </label>
            <label class="config-control">
              <span>CONTRAST</span><output data-output-for="ditherContrast">0.00</output>
              <input type="range" min="-1" max="1" step="0.01" value="0" data-scene-setting="ditherContrast" />
            </label>
            <label class="config-control config-control--select">
              <span>MODE</span><output data-output-for="ditherMode">Inv Halftone</output>
              <select data-scene-setting="ditherMode">
                <option>Static (Flat)</option><option>Halftone</option><option selected>Inv Halftone</option><option>Rotation</option>
                <option>Stretch V</option><option>Stretch H</option><option>Checkerboard</option><option>Glitch</option>
                <option>Melt</option><option>Edge Detect</option><option>Quantize</option><option>Noise</option><option>Threshold</option>
              </select>
            </label>
            <label class="config-control config-control--select">
              <span>SHAPE</span><output data-output-for="ditherShape">Circle</output>
              <select data-scene-setting="ditherShape">
                <option selected>Circle</option><option>Square</option><option>Diamond</option><option>Hexagon</option>
                <option>Rect V</option><option>Rect H</option><option>Diagonal</option><option>Octagon</option>
                <option>Star</option><option>Hollow Rect</option><option>Plus</option>
              </select>
            </label>
            <label class="config-control">
              <span>BASE SCALE</span><output data-output-for="ditherBaseScale">0.76</output>
              <input type="range" min="0.1" max="5" step="0.01" value="0.76" data-scene-setting="ditherBaseScale" />
            </label>
            <label class="config-control">
              <span>INTENSITY</span><output data-output-for="ditherIntensity">2.61</output>
              <input type="range" min="0" max="5" step="0.01" value="2.61" data-scene-setting="ditherIntensity" />
            </label>
            <label class="config-control config-control--color">
              <span>BG COLOR</span><output data-output-for="ditherBgColor">#111111</output>
              <input type="color" value="#111111" data-scene-setting="ditherBgColor" />
            </label>
            <label class="config-control config-control--toggle">
              <span>USE IMAGE COLOR</span><output data-output-for="ditherUseColor">ON</output>
              <input type="checkbox" checked data-scene-setting="ditherUseColor" />
            </label>
            <label class="config-control config-control--color">
              <span>FG COLOR</span><output data-output-for="ditherFgColor">#FFFFFF</output>
              <input type="color" value="#ffffff" data-scene-setting="ditherFgColor" />
            </label>
          </details>

          <details>
            <summary>GRID</summary>
            <label class="config-control">
              <span>RADIUS</span><output data-output-for="cylinderRadius">32</output>
              <input type="range" min="10" max="80" step="1" value="32" data-scene-setting="cylinderRadius" />
            </label>
            <label class="config-control">
              <span>HEIGHT</span><output data-output-for="cylinderHeight">90</output>
              <input type="range" min="20" max="200" step="5" value="90" data-scene-setting="cylinderHeight" />
            </label>
            <label class="config-control">
              <span>CELL SIZE</span><output data-output-for="gridSize">0.45</output>
              <input type="range" min="0.05" max="1" step="0.01" value="0.45" data-scene-setting="gridSize" />
            </label>
            <label class="config-control">
              <span>SUBDIVISIONS</span><output data-output-for="subdivisions">2</output>
              <input type="range" min="1" max="6" step="1" value="2" data-scene-setting="subdivisions" />
            </label>
            <label class="config-control">
              <span>TILE X</span><output data-output-for="tileX">17</output>
              <input type="range" min="1" max="40" step="1" value="17" data-scene-setting="tileX" />
            </label>
            <label class="config-control">
              <span>TILE Y</span><output data-output-for="tileY">5</output>
              <input type="range" min="1" max="40" step="1" value="5" data-scene-setting="tileY" />
            </label>
            <label class="config-control">
              <span>MAJOR LINE W</span><output data-output-for="majorLineWidth">0.0050</output>
              <input type="range" min="0.0005" max="0.01" step="0.0005" value="0.005" data-scene-setting="majorLineWidth" />
            </label>
            <label class="config-control">
              <span>MINOR LINE W</span><output data-output-for="minorLineWidth">0.0040</output>
              <input type="range" min="0.0005" max="0.005" step="0.0005" value="0.004" data-scene-setting="minorLineWidth" />
            </label>
            <label class="config-control">
              <span>DOT SIZE</span><output data-output-for="dotSize">0.011</output>
              <input type="range" min="0.001" max="0.02" step="0.001" value="0.011" data-scene-setting="dotSize" />
            </label>
            <label class="config-control config-control--color">
              <span>MAJOR COLOR</span><output data-output-for="majorLineColor">#0075FF</output>
              <input type="color" value="#0075ff" data-scene-setting="majorLineColor" />
            </label>
            <label class="config-control config-control--color">
              <span>MINOR COLOR</span><output data-output-for="minorLineColor">#0075FF</output>
              <input type="color" value="#0075ff" data-scene-setting="minorLineColor" />
            </label>
            <label class="config-control config-control--color">
              <span>DOT COLOR</span><output data-output-for="dotColor">#0075FF</output>
              <input type="color" value="#0075ff" data-scene-setting="dotColor" />
            </label>
            <label class="config-control">
              <span>MAJOR OPACITY</span><output data-output-for="majorLineOpacity">0.46</output>
              <input type="range" min="0" max="1" step="0.01" value="0.46" data-scene-setting="majorLineOpacity" />
            </label>
            <label class="config-control">
              <span>MINOR OPACITY</span><output data-output-for="minorLineOpacity">0.14</output>
              <input type="range" min="0" max="1" step="0.01" value="0.14" data-scene-setting="minorLineOpacity" />
            </label>
            <label class="config-control">
              <span>DOT OPACITY</span><output data-output-for="dotOpacity">1.00</output>
              <input type="range" min="0" max="1" step="0.01" value="1" data-scene-setting="dotOpacity" />
            </label>
            <label class="config-control">
              <span>HORIZONTAL FADE</span><output data-output-for="horizontalFade">0.10</output>
              <input type="range" min="0" max="1" step="0.05" value="0.1" data-scene-setting="horizontalFade" />
            </label>
            <label class="config-control">
              <span>HORIZONTAL SOFTNESS</span><output data-output-for="horizontalFadeSoftness">0.70</output>
              <input type="range" min="0.01" max="1" step="0.05" value="0.7" data-scene-setting="horizontalFadeSoftness" />
            </label>
            <label class="config-control config-control--color">
              <span>BG COLOR</span><output data-output-for="bgColor">#001D50</output>
              <input type="color" value="#001d50" data-scene-setting="bgColor" />
            </label>
            <label class="config-control">
              <span>BG OPACITY</span><output data-output-for="bgOpacity">0.51</output>
              <input type="range" min="0" max="1" step="0.01" value="0.51" data-scene-setting="bgOpacity" />
            </label>
          </details>

          <details>
            <summary>CAMERA</summary>
            <label class="config-control">
              <span>PAN X INTENSITY</span><output data-output-for="panIntensityX">0.80</output>
              <input type="range" min="0" max="6" step="0.1" value="0.8" data-scene-setting="panIntensityX" />
            </label>
            <label class="config-control">
              <span>PAN Y INTENSITY</span><output data-output-for="panIntensityY">1.20</output>
              <input type="range" min="0" max="4" step="0.1" value="1.2" data-scene-setting="panIntensityY" />
            </label>
            <label class="config-control">
              <span>SMOOTHING</span><output data-output-for="cameraSmoothing">0.06</output>
              <input type="range" min="0.01" max="1" step="0.01" value="0.06" data-scene-setting="cameraSmoothing" />
            </label>
            <label class="config-control">
              <span>BASE ZOOM</span><output data-output-for="initialZoom">11.00</output>
              <input type="range" min="5" max="25" step="0.5" value="11" data-scene-setting="initialZoom" />
            </label>
            <label class="config-control">
              <span>MAX ZOOM OUT</span><output data-output-for="maxZoomOut">28.50</output>
              <input type="range" min="5" max="30" step="0.5" value="28.5" data-scene-setting="maxZoomOut" />
            </label>
            <label class="config-control">
              <span>ZOOM SPEED</span><output data-output-for="zoomSpeed">0.050</output>
              <input type="range" min="0" max="0.3" step="0.005" value="0.05" data-scene-setting="zoomSpeed" />
            </label>
            <label class="config-control">
              <span>ZOOM DECAY</span><output data-output-for="zoomDecay">0.10</output>
              <input type="range" min="0.01" max="0.5" step="0.01" value="0.1" data-scene-setting="zoomDecay" />
            </label>
            <label class="config-control">
              <span>LOOK AT X</span><output data-output-for="lookAtX">0.00</output>
              <input type="range" min="-5" max="5" step="0.1" value="0" data-scene-setting="lookAtX" />
            </label>
            <label class="config-control">
              <span>LOOK AT Y</span><output data-output-for="lookAtY">0.10</output>
              <input type="range" min="-5" max="5" step="0.1" value="0.1" data-scene-setting="lookAtY" />
            </label>
            <label class="config-control">
              <span>LOOK AT Z</span><output data-output-for="lookAtZ">0.00</output>
              <input type="range" min="-5" max="5" step="0.1" value="0" data-scene-setting="lookAtZ" />
            </label>
          </details>

          <details>
            <summary>BLOOM</summary>
            <label class="config-control">
              <span>INTENSITY</span><output data-output-for="bloomIntensity">0.90</output>
              <input type="range" min="0" max="10" step="0.1" value="0.9" data-scene-setting="bloomIntensity" />
            </label>
            <label class="config-control">
              <span>THRESHOLD</span><output data-output-for="bloomThreshold">0.01</output>
              <input type="range" min="0" max="2" step="0.01" value="0.01" data-scene-setting="bloomThreshold" />
            </label>
            <label class="config-control">
              <span>SMOOTHING</span><output data-output-for="bloomSmoothing">0.45</output>
              <input type="range" min="0" max="1" step="0.05" value="0.45" data-scene-setting="bloomSmoothing" />
            </label>
            <label class="config-control">
              <span>RADIUS</span><output data-output-for="bloomRadius">0.65</output>
              <input type="range" min="0" max="1" step="0.05" value="0.65" data-scene-setting="bloomRadius" />
            </label>
          </details>

          <details>
            <summary>SHAPE</summary>
            <label class="config-control config-control--toggle">
              <span>ENABLE</span><output data-output-for="shapeEnabled">ON</output>
              <input type="checkbox" checked data-scene-setting="shapeEnabled" />
            </label>
            <label class="config-control config-control--select">
              <span>SHAPE</span><output data-output-for="shapeType">Torus</output>
              <select data-scene-setting="shapeType">
                <option selected>Torus</option><option>TorusKnot</option><option>Cube</option>
              </select>
            </label>
            <label class="config-control">
              <span>SCALE</span><output data-output-for="torusScale">2.30</output>
              <input type="range" min="0.1" max="10" step="0.1" value="2.3" data-scene-setting="torusScale" />
            </label>
            <label class="config-control config-control--color">
              <span>COLOR</span><output data-output-for="shapeColor">#0075FF</output>
              <input type="color" value="#0075ff" data-scene-setting="shapeColor" />
            </label>
            <label class="config-control">
              <span>AUTO ROTATE</span><output data-output-for="shapeAutoRotateSpeed">0.0040</output>
              <input type="range" min="0" max="0.02" step="0.0005" value="0.004" data-scene-setting="shapeAutoRotateSpeed" />
            </label>
            <label class="config-control">
              <span>SCROLL ROTATE</span><output data-output-for="shapeScrollRotateForce">1.75</output>
              <input type="range" min="0" max="5" step="0.05" value="1.75" data-scene-setting="shapeScrollRotateForce" />
            </label>
            <label class="config-control">
              <span>MAX ROT SPEED</span><output data-output-for="shapeMaxRotationSpeed">0.150</output>
              <input type="range" min="0.005" max="0.3" step="0.005" value="0.15" data-scene-setting="shapeMaxRotationSpeed" />
            </label>
            <label class="config-control">
              <span>ROT SMOOTHING</span><output data-output-for="shapeRotationSmoothing">0.090</output>
              <input type="range" min="0.005" max="0.2" step="0.005" value="0.09" data-scene-setting="shapeRotationSmoothing" />
            </label>
            <label class="config-control">
              <span>TILT X</span><output data-output-for="shapeTiltX">-0.50</output>
              <input type="range" min="-3.1416" max="3.1416" step="0.01" value="-0.5" data-scene-setting="shapeTiltX" />
            </label>
            <label class="config-control">
              <span>TILT Z</span><output data-output-for="shapeTiltZ">-1.95</output>
              <input type="range" min="-3.1416" max="3.1416" step="0.01" value="-1.95" data-scene-setting="shapeTiltZ" />
            </label>
            <label class="config-control">
              <span>SCALE REACT</span><output data-output-for="shapeScaleReact">0.02</output>
              <input type="range" min="0" max="0.5" step="0.01" value="0.02" data-scene-setting="shapeScaleReact" />
            </label>
            <label class="config-control">
              <span>SCALE SMOOTHING</span><output data-output-for="shapeScaleSmoothing">0.04</output>
              <input type="range" min="0.01" max="0.2" step="0.01" value="0.04" data-scene-setting="shapeScaleSmoothing" />
            </label>
            <label class="config-control">
              <span>OPACITY</span><output data-output-for="torusOpacity">0.80</output>
              <input type="range" min="0" max="1" step="0.01" value="0.8" data-scene-setting="torusOpacity" />
            </label>
            <label class="config-control config-control--toggle">
              <span>SINGLE SIDE</span><output data-output-for="shapeSingleSide">ON</output>
              <input type="checkbox" checked data-scene-setting="shapeSingleSide" />
            </label>
          </details>
        </div>
      </section>

        <span>AUDIO VISUALIZATION HUB</span>
        <span id="sidebarDate">—</span>
      </footer>
